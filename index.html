<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Navy SEAL Pro Breather</title>
    <style>
      :root {
        --seal-blue: #001d3d;
        --seal-gold: #ffc300;
        --seal-accent: #003566;
        --text-light: #e0e1dd;
        --danger: #ef233c;
      }

      body {
        background-color: var(--seal-blue);
        color: var(--text-light);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      .lang-switch {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
      }

      .lang-switch button {
        padding: 5px 10px;
        font-size: 0.7rem;
        margin-left: 5px;
        border-radius: 3px;
      }

      h1 {
        margin-bottom: 10px;
        font-weight: 300;
        letter-spacing: 4px;
        color: var(--seal-gold);
        text-transform: uppercase;
        text-align: center;
        font-size: 1.5rem;
      }

      .settings,
      .controls {
        margin-bottom: 15px;
        display: flex;
        gap: 10px;
      }

      button {
        background: var(--seal-accent);
        border: 1px solid var(--seal-gold);
        color: var(--seal-gold);
        padding: 10px 18px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
        border-radius: 4px;
        text-transform: uppercase;
        font-size: 0.8rem;
      }

      button:hover {
        background: var(--seal-gold);
        color: var(--seal-blue);
      }
      button.active {
        background: var(--seal-gold);
        color: var(--seal-blue);
      }
      button.btn-main {
        padding: 12px 25px;
        font-size: 1rem;
        border-width: 2px;
      }
      button.btn-reset {
        border-color: var(--danger);
        color: var(--danger);
      }

      .box-container {
        position: relative;
        width: 300px;
        height: 300px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.2);
      }

      .dot {
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: var(--seal-gold);
        border-radius: 50%;
        box-shadow: 0 0 20px var(--seal-gold);
        top: 290px;
        left: -10px;
        z-index: 10;
      }

      .instruction-container {
        text-align: center;
        pointer-events: none;
      }
      #phase-text {
        font-size: 1.4rem;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 5px;
        display: block;
        min-height: 1.6rem;
      }
      #timer {
        font-size: 5rem;
        font-family: monospace;
        font-weight: bold;
        line-height: 1;
      }
      .total-time-display {
        margin-top: 10px;
        font-size: 0.9rem;
        color: var(--seal-gold);
        font-weight: bold;
        opacity: 0.8;
      }
      .info-text {
        margin-top: 20px;
        font-size: 0.8rem;
        opacity: 0.5;
        max-width: 280px;
        text-align: center;
        min-height: 2.4rem;
      }
    </style>
  </head>
  <body>
    <div class="lang-switch">
      <button onclick="setLanguage('en')" id="lang-en">EN</button>
      <button onclick="setLanguage('de')" id="lang-de">DE</button>
    </div>

    <h1 id="title">Box Breathing</h1>

    <div class="settings">
      <button onclick="setBoxTime(4)" id="btn-4" class="active">4s</button>
      <button onclick="setBoxTime(6)" id="btn-6">6s</button>
      <button onclick="setBoxTime(8)" id="btn-8">8s</button>
    </div>

    <div class="box-container">
      <div id="dot" class="dot"></div>
      <div class="instruction-container">
        <span id="phase-text">Ready?</span>
        <div id="timer">--</div>
        <div class="total-time-display" id="total-time-label">
          Session: 00:00
        </div>
      </div>
    </div>

    <div class="controls" style="margin-top: 30px">
      <button class="btn-main" id="startStopBtn" onclick="togglePlay()">
        Start
      </button>
      <button
        class="btn-main btn-reset"
        id="resetBtn"
        onclick="resetExercise()"
      >
        Reset
      </button>
    </div>

    <p class="info-text" id="status-msg">Select your time and press start.</p>

    <script>
      let currentLang = "en";
      let boxTime = 4;
      let currentPhase = -1;
      let timeLeft = 0;
      let isRunning = false;
      let timerInterval;
      let totalSeconds = 0;

      const translations = {
        en: {
          title: "Box Breathing",
          ready: "Ready?",
          start: "Start",
          pause: "Pause",
          reset: "Reset",
          resume: "Resume",
          session: "Session: ",
          statusDefault: "Select your time and press start.",
          statusRunning:
            "Focus on the gold dot. Breathe in and out as indicated.",
          statusPaused: "Exercise paused. Press resume to continue.",
          phases: ["Inhale", "Hold (Full)", "Exhale", "Hold (Empty)"],
        },
        de: {
          title: "Box-Atmung",
          ready: "Bereit?",
          start: "Start",
          pause: "Pause",
          reset: "Reset",
          resume: "Weiter",
          session: "Sitzung: ",
          statusDefault: "Wähle deine Zeit und drücke Start.",
          statusRunning: "Fokussiere den gelben Punkt. Atme wie vorgegeben.",
          statusPaused: "Übung pausiert. Drücke Weiter zum Fortfahren.",
          phases: ["Einatmen", "Halten (Voll)", "Ausatmen", "Halten (Leer)"],
        },
      };

      const dot = document.getElementById("dot");
      const phaseText = document.getElementById("phase-text");
      const timerDisplay = document.getElementById("timer");
      const startStopBtn = document.getElementById("startStopBtn");
      const resetBtn = document.getElementById("resetBtn");
      const statusMsg = document.getElementById("status-msg");
      const titleEl = document.getElementById("title");
      const totalTimeDisplay = document.getElementById("total-time-label");

      function formatTotalTime(s) {
        const mins = Math.floor(s / 60);
        const secs = s % 60;
        return `${mins.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
      }

      function updateStatusText() {
        const t = translations[currentLang];
        if (currentPhase === -1) statusMsg.innerText = t.statusDefault;
        else if (isRunning) statusMsg.innerText = t.statusRunning;
        else statusMsg.innerText = t.statusPaused;
      }

      function setLanguage(lang) {
        currentLang = lang;
        document
          .getElementById("lang-en")
          .classList.toggle("active", lang === "en");
        document
          .getElementById("lang-de")
          .classList.toggle("active", lang === "de");

        const t = translations[lang];
        titleEl.innerText = t.title;
        resetBtn.innerText = t.reset;
        totalTimeDisplay.innerText = t.session + formatTotalTime(totalSeconds);

        if (!isRunning) {
          if (currentPhase === -1) {
            phaseText.innerText = t.ready;
            startStopBtn.innerText = t.start;
          } else {
            startStopBtn.innerText = t.resume;
            phaseText.innerText = t.phases[currentPhase];
          }
        } else {
          startStopBtn.innerText = t.pause;
          phaseText.innerText = t.phases[currentPhase];
        }
        updateStatusText();
      }

      function setBoxTime(s) {
        boxTime = parseInt(s);
        document
          .querySelectorAll(".settings button")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(`btn-${s}`).classList.add("active");
        if (!isRunning) resetExercise();
      }

      function togglePlay() {
        if (isRunning) stopExercise();
        else startExercise();
      }

      function startExercise() {
        isRunning = true;
        const t = translations[currentLang];
        startStopBtn.innerText = t.pause;
        startStopBtn.style.color = "var(--danger)";

        if (currentPhase === -1) {
          currentPhase = 0;
          timeLeft = boxTime;
        }
        updateStatusText();
        runCycle();
      }

      function stopExercise() {
        isRunning = false;
        const t = translations[currentLang];
        startStopBtn.innerText = t.resume;
        startStopBtn.style.color = "var(--seal-gold)";
        clearInterval(timerInterval);

        const computedStyle = window.getComputedStyle(dot);
        dot.style.top = computedStyle.top;
        dot.style.left = computedStyle.left;
        dot.style.transition = "none";
        updateStatusText();
      }

      function resetExercise() {
        stopExercise();
        currentPhase = -1;
        timeLeft = boxTime;
        totalSeconds = 0;
        const t = translations[currentLang];
        startStopBtn.innerText = t.start;
        phaseText.innerText = t.ready;
        phaseText.style.color = "var(--text-light)";
        timerDisplay.innerText = "--";
        totalTimeDisplay.innerText = t.session + "00:00";
        updateStatusText();

        dot.style.transition = "none";
        dot.style.left = "-10px";
        dot.style.top = "290px";
      }

      function runCycle() {
        if (!isRunning) return;

        const t = translations[currentLang];
        phaseText.innerText = t.phases[currentPhase];
        phaseText.style.color = ["#00ffcc", "#ffc300", "#ff595e", "#a2d2ff"][
          currentPhase
        ];
        timerDisplay.innerText = timeLeft;

        moveDot(timeLeft);

        timerInterval = setInterval(() => {
          timeLeft--;
          totalSeconds++;
          timerDisplay.innerText = timeLeft;
          totalTimeDisplay.innerText =
            translations[currentLang].session + formatTotalTime(totalSeconds);

          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            currentPhase = (currentPhase + 1) % 4;
            timeLeft = boxTime;
            runCycle();
          }
        }, 1000);
      }

      function moveDot(duration) {
        dot.style.transition = `all ${duration}s linear`;
        const size = 300;
        const offset = -10;

        switch (currentPhase) {
          case 0:
            dot.style.top = offset + "px";
            dot.style.left = offset + "px";
            break;
          case 1:
            dot.style.left = size + offset + "px";
            dot.style.top = offset + "px";
            break;
          case 2:
            dot.style.top = size + offset + "px";
            dot.style.left = size + offset + "px";
            break;
          case 3:
            dot.style.left = offset + "px";
            dot.style.top = size + offset + "px";
            break;
        }
      }

      setLanguage("en");
    </script>
  </body>
</html>
